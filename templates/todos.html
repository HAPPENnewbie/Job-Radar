{% extends "base.html" %}

{% block title %}待办事项 - 2027届机会看板{% endblock %}

{% block page_title %}待办事项{% endblock %}
{% block page_desc %}查看近期需要处理的信息{% endblock %}

{% block content %}
    <!-- ========== 待办视图 ========== -->
    <div id="todo-container">
        <p class="placeholder">加载中...</p>
    </div>
{% endblock %}

{% block extra_js %}
<script>
/* 待办页面逻辑 - 使用公共 loadData() 和 renderTodoView() */
document.addEventListener('DOMContentLoaded', async () => {
    // 使用公共的 loadData() 加载数据
    if (typeof loadData === 'function') {
        await loadData();
    } else {
        console.error('loadData 函数未找到');
        document.getElementById('todo-container').innerHTML = '<p class="placeholder">页面初始化失败，请刷新</p>';
    }
});
</script>
{% endblock %}
