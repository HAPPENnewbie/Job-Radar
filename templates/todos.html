{% extends "base.html" %}

{% block title %}待办事项 - 2027届机会看板{% endblock %}

{% block page_title %}待办事项{% endblock %}
{% block page_desc %}按时间范围、类型、动作筛选需要处理的机会、日历节点和岗位收藏{% endblock %}

{% block content %}
    <div class="toolbar todo-filter-toolbar">
        <div class="toolbar-left">
            <div class="filter-group">
                <label>时间范围：</label>
                <div class="filter-tabs" id="todo-range-tabs">
                    <button class="filter-tab" data-value="7d">近7天</button>
                    <button class="filter-tab" data-value="30d">近30天</button>
                    <button class="filter-tab active" data-value="90d">近90天</button>
                    <button class="filter-tab" data-value="all">全部</button>
                    <button class="filter-tab" data-value="custom">自定义</button>
                </div>
            </div>
            <div class="filter-group" id="todo-custom-range" style="display:none;">
                <label>开始月份：</label>
                <input type="month" id="todo-month-from" class="filter-input">
                <label>结束月份：</label>
                <input type="month" id="todo-month-to" class="filter-input">
            </div>
        </div>
    </div>

    <div class="toolbar todo-filter-toolbar">
        <div class="toolbar-left">
            <div class="filter-group">
                <label>类型：</label>
                <select id="todo-type-filter" class="filter-select">
                    <option value="all">全部</option>
                    <option value="opp">机会</option>
                    <option value="event">日历节点</option>
                    <option value="fav">岗位收藏</option>
                </select>
            </div>
            <div class="filter-group">
                <label>当前动作：</label>
                <select id="todo-action-filter" class="filter-select">
                    <option value="all">全部</option>
                    <option value="等公告">等公告</option>
                    <option value="等报名">等报名</option>
                    <option value="待报名">待报名</option>
                    <option value="待投递">待投递</option>
                    <option value="待笔试">待笔试</option>
                    <option value="待面试">待面试</option>
                    <option value="待确认">待确认</option>
                </select>
            </div>
            <div class="filter-group">
                <label>状态：</label>
                <select id="todo-status-filter" class="filter-select">
                    <option value="all">全部</option>
                    <option value="待更新">待更新</option>
                    <option value="参考往年">参考往年</option>
                    <option value="官方已确定">官方已确定</option>
                    <option value="已放弃">已放弃</option>
                </select>
            </div>
            <button id="todo-clear-filter" class="btn btn-secondary btn-sm">清空筛选</button>
        </div>
    </div>

    <div id="todo-range-display" class="todo-range-display">当前范围：近90天</div>

    <div id="todo-container">
        <p class="placeholder">加载中...</p>
    </div>
{% endblock %}

{% block extra_js %}
<script>
const defaultTodoRange = (window.JOB_RADAR_SETTINGS && window.JOB_RADAR_SETTINGS.default_todo_range) || '90d';
const todoState = {
    range: defaultTodoRange,
    type: 'all',
    action: 'all',
    status: 'all',
    monthFrom: '',
    monthTo: ''
};

function pad2(n) { return String(n).padStart(2, '0'); }
function toMonth(date) { return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}`; }
function parseDay(value) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(value || '')) return null;
    const [y, m, d] = value.split('-').map(Number);
    return new Date(y, m - 1, d);
}
function parseMonthStart(value) {
    if (!/^\d{4}-\d{2}$/.test(value || '')) return null;
    const [y, m] = value.split('-').map(Number);
    return new Date(y, m - 1, 1);
}
function parseMonthEnd(value) {
    if (!/^\d{4}-\d{2}$/.test(value || '')) return null;
    const [y, m] = value.split('-').map(Number);
    return new Date(y, m, 0);
}
function parseTimeRanges(text) {
    text = (text || '').trim();
    if (!text) return [];
    if (text.includes('本月')) {
        const m = toMonth(new Date());
        return [{ start: parseMonthStart(m), end: parseMonthEnd(m), month: m, raw: text }];
    }
    const parts = text.split('~').map(s => s.trim()).filter(Boolean);
    if (parts.length === 0 || parts.length > 2) return [];
    const startRaw = parts[0];
    const endRaw = parts[1] || parts[0];
    let start = null;
    let end = null;
    let month = null;
    if (/^\d{4}-\d{2}-\d{2}$/.test(startRaw)) {
        start = parseDay(startRaw);
        month = startRaw.slice(0, 7);
    } else if (/^\d{4}-\d{2}$/.test(startRaw)) {
        start = parseMonthStart(startRaw);
        month = startRaw;
    }
    if (/^\d{4}-\d{2}-\d{2}$/.test(endRaw)) {
        end = parseDay(endRaw);
    } else if (/^\d{4}-\d{2}$/.test(endRaw)) {
        end = parseMonthEnd(endRaw);
    }
    if (!start || !end) return [];
    if (end < start) return [];
    return [{ start, end, month, raw: text }];
}
function getTodoWindow() {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    if (todoState.range === 'all') return null;
    if (todoState.range === 'custom') {
        if (!todoState.monthFrom || !todoState.monthTo) return null;
        return {
            start: parseMonthStart(todoState.monthFrom),
            end: parseMonthEnd(todoState.monthTo)
        };
    }
    const days = todoState.range === '7d' ? 7 : todoState.range === '30d' ? 30 : 90;
    return {
        start: today,
        end: new Date(today.getTime() + days * 24 * 60 * 60 * 1000)
    };
}
function rangesOverlap(aStart, aEnd, bStart, bEnd) {
    if (!aStart || !aEnd || !bStart || !bEnd) return false;
    return aStart <= bEnd && aEnd >= bStart;
}
function timeTextInRange(text) {
    const ranges = parseTimeRanges(text);
    if (ranges.length === 0) return todoState.range === 'all';
    const win = getTodoWindow();
    if (!win) return true;
    return ranges.some(r => rangesOverlap(r.start, r.end, win.start, win.end));
}
function eventInRange(ev) {
    const startRaw = ev.event_date || ev.date || ev.month || '';
    const endRaw = ev.end_date || startRaw;
    const value = endRaw && endRaw !== startRaw ? `${startRaw}~${endRaw}` : startRaw;
    return timeTextInRange(value);
}
function itemMatchesTodoFilters(item, type) {
    if (todoState.type !== 'all' && type !== todoState.type) return false;
    if (todoState.action !== 'all' && (item.current_action || '') !== todoState.action) return false;
    if (todoState.status !== 'all') {
        if (type === 'fav') return false;
        if ((item.status || '') !== todoState.status) return false;
    }
    return true;
}
function getRangeLabel() {
    if (todoState.range === 'custom') {
        return todoState.monthFrom && todoState.monthTo
            ? `自定义：${todoState.monthFrom} 至 ${todoState.monthTo}`
            : '自定义范围（未设置时显示全部）';
    }
    return { '7d': '近7天', '30d': '近30天', '90d': '近90天', all: '全部' }[todoState.range] || '近90天';
}
function oppHasTimeInRange(o) {
    return [
        o.expected_announcement_time,
        o.expected_apply_time,
        o.expected_exam_time,
        o.expected_interview_time
    ].some(timeTextInRange);
}
function favHasTimeInRange(f) {
    return [f.apply_time, f.exam_time, f.interview_time].some(timeTextInRange);
}

function renderTodoView() {
    const todoContainer = document.getElementById('todo-container');
    const rangeDisplay = document.getElementById('todo-range-display');
    if (!todoContainer) return;
    if (rangeDisplay) rangeDisplay.textContent = `当前范围：${getRangeLabel()}`;

    const existingOppIds = new Set((state.opps || []).map(o => String(o.id)));
    const opps = state.opps || [];
    const events = (state.tlAllEvents || []).filter(e => !e.opportunity_id || existingOppIds.has(String(e.opportunity_id)));
    const favs = state.favorites || [];

    let html = '';

    if (todoState.type === 'all' || todoState.type === 'event') {
        const nodeItems = events
            .filter(eventInRange)
            .filter(e => itemMatchesTodoFilters(e, 'event'))
            .sort((a, b) => (a.event_date || a.date || `${a.month}-01`).localeCompare(b.event_date || b.date || `${b.month}-01`));
        html += renderTodoGroup('近期日历节点', nodeItems.map(e => ({ ...e, _type: 'event' })));
    }

    if (todoState.type === 'all' || todoState.type === 'opp') {
        const actionSet = ['等公告', '等报名', '待报名', '待投递', '待笔试', '待面试'];
        const oppItems = opps
            .filter(o => oppHasTimeInRange(o) || actionSet.includes(o.current_action))
            .filter(o => itemMatchesTodoFilters(o, 'opp'));
        html += renderTodoGroup('机会待处理', oppItems.map(o => ({ ...o, _type: 'opp' })));
    }

    if (todoState.type === 'all' || todoState.type === 'fav') {
        const pendingActions = ['待确认', '待报名', '待投递', '待笔试', '待面试'];
        const favItems = favs
            .filter(f => pendingActions.includes(f.current_action) || favHasTimeInRange(f))
            .filter(f => itemMatchesTodoFilters(f, 'fav'));
        html += renderTodoGroup('岗位收藏待处理', favItems.map(f => ({ ...f, _type: 'fav' })));
    }

    if (todoState.type === 'all' || todoState.type === 'opp') {
        const overdueItems = opps.filter(o => {
            const isOverdue = (o.status === '参考往年' || o.status === '待更新') &&
                ['等公告', '等报名', '待投递', '待笔试', '待面试'].includes(o.current_action);
            return isOverdue && itemMatchesTodoFilters(o, 'opp') && (todoState.range === 'all' || oppHasTimeInRange(o));
        });
        html += renderTodoGroup('过期待更新', overdueItems.map(o => ({ ...o, _type: 'opp' })));
    }

    if (todoState.type === 'all' || todoState.type === 'opp') {
        const noLinkOpps = opps.filter(o => {
            const noLink = !o.official_url && !o.announcement_url && !o.position_url;
            return noLink && itemMatchesTodoFilters(o, 'opp') && (todoState.range === 'all' || oppHasTimeInRange(o));
        });
        html += renderTodoGroup('待确认链接', noLinkOpps.map(o => ({ ...o, _type: 'opp' })));
    }

    todoContainer.innerHTML = html || '<p class="todo-empty">暂无待处理事项</p>';
}

function renderTodoGroup(title, items) {
    if (!items || items.length === 0) return '';
    let html = `<div class="todo-group"><div class="todo-group-title">${esc(title)} <span class="todo-group-badge">${items.length}</span></div><div class="todo-list">`;
    items.forEach(item => {
        if (item._type === 'event') {
            html += `
                <div class="todo-item">
                    <div class="todo-item-content">
                        <div class="todo-item-title">${esc(item.title)}</div>
                        <div class="todo-item-meta">
                            <span class="event-type-badge">${esc(item.event_type || '其他')}</span>
                            <span>${esc(item.event_date || item.date || item.month)}</span>
                            <span>${esc(item.category)}</span>
                            ${item.end_date ? `<span>至 ${esc(item.end_date)}</span>` : ''}
                            ${item.opportunity_name ? `<span>🔗 ${esc(item.opportunity_name)}</span>` : '<span>未关联机会</span>'}
                            ${statusTag(item.status)}
                        </div>
                    </div>
                    <div class="todo-item-actions"><button class="btn btn-sm btn-secondary" onclick="showTlDetail(${item.id})">查看</button></div>
                </div>`;
        } else if (item._type === 'fav') {
            html += `
                <div class="todo-item">
                    <div class="todo-item-content">
                        <div class="todo-item-title">${esc(item.job_name)}</div>
                        <div class="todo-item-meta">
                            <span>${esc(item.opportunity_name)}</span>
                            <span>${esc(item.current_action)}</span>
                            ${matchStatusTag(item.match_status)}
                            ${item.apply_time ? `<span>报名：${esc(formatTimeValue ? formatTimeValue(item.apply_time) : item.apply_time)}</span>` : ''}
                        </div>
                    </div>
                    <div class="todo-item-actions">
                        <button class="btn btn-sm btn-secondary" onclick="editFav(${item.id})">编辑</button>
                        ${item.job_url ? `<a href="${esc(item.job_url)}" target="_blank" class="btn btn-sm btn-primary">岗位</a>` : ''}
                    </div>
                </div>`;
        } else {
            html += `
                <div class="todo-item">
                    <div class="todo-item-content">
                        <div class="todo-item-title">${esc(item.name)}</div>
                        <div class="todo-item-meta">
                            <span>${esc(item.category)}</span>
                            <span>${esc(item.current_action)}</span>
                            ${statusTag(item.status)}
                            ${item.expected_apply_time ? `<span>报名：${esc(formatTimeValue ? formatTimeValue(item.expected_apply_time) : item.expected_apply_time)}</span>` : ''}
                        </div>
                    </div>
                    <div class="todo-item-actions">
                        <button class="btn btn-sm btn-secondary" onclick="editOpp(${item.id})">编辑</button>
                        ${item.official_url ? `<a href="${esc(item.official_url)}" target="_blank" class="btn btn-sm btn-primary">官网</a>` : ''}
                    </div>
                </div>`;
        }
    });
    html += '</div></div>';
    return html;
}

document.addEventListener('DOMContentLoaded', () => {
    const rangeTabs = document.getElementById('todo-range-tabs');
    const customRange = document.getElementById('todo-custom-range');
    const monthFrom = document.getElementById('todo-month-from');
    const monthTo = document.getElementById('todo-month-to');
    const typeFilter = document.getElementById('todo-type-filter');
    const actionFilter = document.getElementById('todo-action-filter');
    const statusFilter = document.getElementById('todo-status-filter');
    const clearBtn = document.getElementById('todo-clear-filter');

    if (rangeTabs) {
        rangeTabs.querySelectorAll('.filter-tab').forEach(b => {
            b.classList.toggle('active', b.dataset.value === todoState.range);
        });
        if (customRange) customRange.style.display = todoState.range === 'custom' ? 'flex' : 'none';
        rangeTabs.addEventListener('click', (e) => {
            const btn = e.target.closest('.filter-tab');
            if (!btn) return;
            rangeTabs.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            todoState.range = btn.dataset.value;
            if (customRange) customRange.style.display = todoState.range === 'custom' ? 'flex' : 'none';
            renderTodoView();
        });
    }
    if (monthFrom) monthFrom.addEventListener('change', () => { todoState.monthFrom = monthFrom.value; renderTodoView(); });
    if (monthTo) monthTo.addEventListener('change', () => { todoState.monthTo = monthTo.value; renderTodoView(); });
    if (typeFilter) typeFilter.addEventListener('change', () => { todoState.type = typeFilter.value; renderTodoView(); });
    if (actionFilter) actionFilter.addEventListener('change', () => { todoState.action = actionFilter.value; renderTodoView(); });
    if (statusFilter) statusFilter.addEventListener('change', () => { todoState.status = statusFilter.value; renderTodoView(); });
    if (clearBtn) clearBtn.addEventListener('click', () => {
        todoState.range = defaultTodoRange;
        todoState.type = 'all';
        todoState.action = 'all';
        todoState.status = 'all';
        todoState.monthFrom = '';
        todoState.monthTo = '';
        if (typeFilter) typeFilter.value = 'all';
        if (actionFilter) actionFilter.value = 'all';
        if (statusFilter) statusFilter.value = 'all';
        if (monthFrom) monthFrom.value = '';
        if (monthTo) monthTo.value = '';
        if (customRange) customRange.style.display = todoState.range === 'custom' ? 'flex' : 'none';
        if (rangeTabs) {
            rangeTabs.querySelectorAll('.filter-tab').forEach(b => b.classList.toggle('active', b.dataset.value === defaultTodoRange));
        }
        renderTodoView();
    });
});
</script>
{% endblock %}
