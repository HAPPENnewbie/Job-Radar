{% extends "base.html" %}

{% block title %}机会管理 - 2027届机会看板{% endblock %}

{% block page_title %}机会管理{% endblock %}
{% block page_desc %}维护考试和招聘大类机会{% endblock %}

{% block content %}
    <!-- ========== 一级分类：大类筛选 ========== -->
    <section class="section filter-section">
        <h3 class="filter-section-title">机会大类</h3>
        <div class="filter-tabs" id="track-filter">
            <button class="filter-tab active" data-value="">全部</button>
            <button class="filter-tab" data-value="体制/准体制">🏛️ 体制内</button>
            <button class="filter-tab" data-value="互联网/市场化">💻 计算机秋招</button>
        </div>
    </section>

    <!-- ========== 二级筛选：详细条件 ========== -->
    <div class="toolbar">
        <div class="toolbar-left">
            <input type="text" id="search-input" class="search-input"
                   placeholder="搜索：名称 / 类别 / 地域 / 备注...">
            <button id="btn-clear-search" class="btn btn-secondary btn-sm">清空</button>
            <select id="filter-priority" class="filter-select">
                <option value="">优先级：全部</option>
                <option value="重点关注">重点关注</option>
                <option value="可以关注">可以关注</option>
                <option value="低频关注">低频关注</option>
            </select>
            <select id="filter-region" class="filter-select">
                <option value="">地域：全部</option>
                <option value="衡阳">衡阳</option>
                <option value="湖南">湖南</option>
                <option value="全国">全国</option>
                <option value="远程">远程</option>
            </select>
            <select id="filter-status" class="filter-select">
                <option value="">状态：全部</option>
                <option value="参考往年">参考往年</option>
                <option value="官方已确定">官方已确定</option>
                <option value="待更新">待更新</option>
                <option value="已放弃">已放弃</option>
            </select>
            <select id="filter-action" class="filter-select">
                <option value="">动作：全部</option>
                <option value="等公告">等公告</option>
                <option value="等报名">等报名</option>
                <option value="待报名">待报名</option>
                <option value="待投递">待投递</option>
                <option value="已投递">已投递</option>
                <option value="待笔试">待笔试</option>
                <option value="待面试">待面试</option>
                <option value="已结束">已结束</option>
                <option value="已放弃">已放弃</option>
            </select>
        </div>
        <div class="toolbar-right">
            <button id="btn-add-opp" class="btn btn-primary">+ 新增机会</button>
        </div>
    </div>

    <!-- ========== 机会列表 ========== -->
    <section class="section">
        <h2 class="section-title">机会列表 <span id="opp-count" class="badge">0</span></h2>
        <div id="opp-list" class="card-grid">
            <p class="placeholder">加载中...</p>
        </div>
    </section>
{% endblock %}

{% block extra_js %}
{% endblock %}
