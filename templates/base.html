<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}2027届机会看板{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .jr-time-picker {
            border: 1px solid var(--c-border, #e5e7eb);
            border-radius: 12px;
            padding: 10px;
            background: var(--c-bg-soft, #fafafa);
        }
        .jr-time-picker-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 8px;
        }
        .jr-time-picker-row:last-child { margin-bottom: 0; }
        .jr-time-picker select,
        .jr-time-picker input { width: 100%; }
        .jr-time-picker .jr-end-wrap.is-hidden,
        .is-hidden { display: none !important; }
        .jr-time-legacy {
            margin-top: 6px;
            font-size: 12px;
            color: #b45309;
            display: none;
        }
        .jr-time-legacy.show { display: block; }
        .jr-card-line {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
            color: var(--c-text-2, #666);
            font-size: 0.86rem;
        }
        .jr-fav-hint {
            color: var(--c-text-3, #888);
            font-size: 0.9rem;
        }
        @media (max-width: 720px) {
            .jr-time-picker-row { grid-template-columns: 1fr; }
        }
    </style>

    <script id="jr-settings-data" type="application/json">{{ app_settings|tojson }}</script>
    <script>
        window.JOB_RADAR_SETTINGS = {};
        (function () {
            try {
                const settingsEl = document.getElementById('jr-settings-data');
                if (settingsEl) {
                    window.JOB_RADAR_SETTINGS = JSON.parse(settingsEl.textContent || '{}');
                }
                const saved = localStorage.getItem('jrSidebarCollapsed');
                const fromSetting = !!(window.JOB_RADAR_SETTINGS && window.JOB_RADAR_SETTINGS.sidebar_default_collapsed);
                const collapsed = saved === null ? fromSetting : saved === '1';
                if (collapsed) document.documentElement.classList.add('sidebar-collapsed');
            } catch (e) {
                window.JOB_RADAR_SETTINGS = {};
            }
        })();
    </script>
</head>
<body>

<div class="app-layout">

    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="/" class="brand-lockup" aria-label="就业雷达首页">
                <span class="brand-logo" aria-hidden="true">
                    <svg viewBox="0 0 32 32" focusable="false">
                        <defs>
                            <linearGradient id="jrLogoGradient" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#2563eb"/>
                                <stop offset="0.55" stop-color="#06b6d4"/>
                                <stop offset="1" stop-color="#22c55e"/>
                            </linearGradient>
                        </defs>
                        <rect x="3" y="3" width="26" height="26" rx="9" fill="url(#jrLogoGradient)"/>
                        <path d="M9 18.8 14.1 8.6h3.2L12.2 18.8h5.3l-1.6 4.6" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M19.4 9.2h3.1v13.6" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round"/>
                    </svg>
                </span>
                <span class="brand-wordmark">
                    <span class="brand-title">就业雷达</span>
                    <span class="brand-subtitle">Job Radar</span>
                </span>
            </a>
            <button class="sidebar-toggle" id="sidebar-toggle" aria-label="展开或收起侧边栏" title="展开/收起侧边栏">
                <span></span><span></span><span></span>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item {% if active_page == 'home' %}active{% endif %}">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3.5 10.8 12 4l8.5 6.8"/><path d="M5.5 9.8V20h13V9.8"/><path d="M9.5 20v-6h5v6"/></svg></span><span class="nav-text">首页总览</span>
            </a>
            <a href="/opportunities" class="nav-item {% if active_page == 'opportunities' %}active{% endif %}">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M8 6.5h8"/><path d="M8 11.5h8"/><path d="M8 16.5h5"/><rect x="5" y="3.5" width="14" height="17" rx="3"/></svg></span><span class="nav-text">机会管理</span>
            </a>
            <a href="/job-favorites" class="nav-item {% if active_page == 'favorites' %}active{% endif %}">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m12 4.2 2.35 4.76 5.25.76-3.8 3.7.9 5.23L12 16.18 7.3 18.65l.9-5.23-3.8-3.7 5.25-.76L12 4.2Z"/></svg></span><span class="nav-text">岗位收藏</span>
            </a>
            <a href="/timeline" class="nav-item {% if active_page == 'timeline' %}active{% endif %}">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="3"/><path d="M8 3.5v3"/><path d="M16 3.5v3"/><path d="M4 9h16"/><path d="M8 13h.01"/><path d="M12 13h.01"/><path d="M16 13h.01"/><path d="M8 17h.01"/><path d="M12 17h.01"/></svg></span><span class="nav-text">时间日历</span>
            </a>
            <a href="/todos" class="nav-item {% if active_page == 'todos' %}active{% endif %}">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="4"/><path d="m8.2 12.2 2.4 2.4 5.2-5.5"/></svg></span><span class="nav-text">待办事项</span>
            </a>
            <a href="/data" class="nav-item {% if active_page == 'data' %}active{% endif %}">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><ellipse cx="12" cy="6" rx="6.5" ry="3"/><path d="M5.5 6v6c0 1.66 2.9 3 6.5 3s6.5-1.34 6.5-3V6"/><path d="M5.5 12v6c0 1.66 2.9 3 6.5 3s6.5-1.34 6.5-3v-6"/></svg></span><span class="nav-text">数据管理</span>
            </a>
            <a href="/settings" class="nav-item {% if active_page == 'settings' %}active{% endif %}">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 8.3a3.7 3.7 0 1 0 0 7.4 3.7 3.7 0 0 0 0-7.4Z"/><path d="M18.6 13.5c.08-.49.08-1.01 0-1.5l2-1.55-2-3.46-2.42.98a7.4 7.4 0 0 0-1.3-.76L14.5 4.6h-4l-.38 2.61c-.46.2-.9.46-1.3.76L6.4 6.99l-2 3.46 2 1.55a7.6 7.6 0 0 0 0 1.5l-2 1.55 2 3.46 2.42-.98c.4.3.84.56 1.3.76l.38 2.61h4l.38-2.61c.46-.2.9-.46 1.3-.76l2.42.98 2-3.46-2-1.55Z"/></svg></span><span class="nav-text">设置</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="footer-powered">powered by hayden</div>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>{% block page_title %}页面标题{% endblock %}</h1>
            <p class="page-desc">{% block page_desc %}页面说明{% endblock %}</p>
        </div>
        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>

</div>

<div id="confirm-dialog" class="modal" style="display:none;">
    <div class="modal-content modal-small">
        <p id="confirm-msg" class="confirm-msg"></p>
        <div class="form-actions">
            <button id="confirm-yes" class="btn btn-danger">确认</button>
            <button id="confirm-no" class="btn btn-secondary">取消</button>
        </div>
    </div>
</div>

<div id="modal-opp" class="modal" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-opp-title">新增机会</h3>
            <button class="modal-close" data-close="modal-opp">&times;</button>
        </div>
        <form id="form-opp" class="modal-body">
            <input type="hidden" id="opp-id">
            <div class="form-row">
                <div class="form-group">
                    <label>机会名称 <span class="required">*</span></label>
                    <input type="text" id="opp-name" required>
                </div>
                <div class="form-group">
                    <label>机会大类 <span class="required">*</span></label>
                    <select id="opp-track" required>
                        <option value="">加载分类中...</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>具体类别 <span class="required">*</span></label>
                    <select id="opp-category" required>
                        <option value="">请先选择机会大类</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>关注优先级</label>
                    <select id="opp-priority">
                        <option value="重点关注">重点关注</option>
                        <option value="可以关注">可以关注</option>
                        <option value="低频关注">低频关注</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>地域</label>
                    <select id="opp-region">
                        <option value="衡阳">衡阳</option>
                        <option value="湖南">湖南</option>
                        <option value="全国">全国</option>
                        <option value="远程">远程</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>是否适合计算机硕士</label>
                    <select id="opp-fit">
                        <option value="是">是</option>
                        <option value="否">否</option>
                        <option value="待确认">待确认</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>公告/启动时间</label>
                    <input type="hidden" id="opp-ann-time">
                    <div class="jr-time-picker" data-time-picker="opp-ann-time"></div>
                </div>
                <div class="form-group">
                    <label>报名/投递时间</label>
                    <input type="hidden" id="opp-app-time">
                    <div class="jr-time-picker" data-time-picker="opp-app-time"></div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>笔试/测评时间</label>
                    <input type="hidden" id="opp-exam-time">
                    <div class="jr-time-picker" data-time-picker="opp-exam-time"></div>
                </div>
                <div class="form-group">
                    <label>面试/后续时间</label>
                    <input type="hidden" id="opp-int-time">
                    <div class="jr-time-picker" data-time-picker="opp-int-time"></div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>官网链接</label>
                    <input type="url" id="opp-url" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>公告链接</label>
                    <input type="url" id="opp-ann-url" placeholder="https://...">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>岗位表链接</label>
                    <input type="url" id="opp-pos-url" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>报名/投递入口</label>
                    <input type="url" id="opp-apply-url" placeholder="https://...">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>状态</label>
                    <select id="opp-status">
                        <option value="参考往年">参考往年</option>
                        <option value="官方已确定">官方已确定</option>
                        <option value="待更新">待更新</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>当前动作</label>
                    <select id="opp-action">
                        <option value="持续关注">持续关注</option>
                        <option value="等公告">等公告</option>
                        <option value="等报名">等报名</option>
                        <option value="待投递">待投递</option>
                        <option value="已投递">已投递</option>
                        <option value="待笔试">待笔试</option>
                        <option value="待面试">待面试</option>
                        <option value="已结束">已结束</option>
                        <option value="已放弃">已放弃</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="opp-note" rows="3"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">保存</button>
                <button type="button" class="btn btn-secondary" data-close="modal-opp">取消</button>
            </div>
        </form>
    </div>
</div>

<div id="modal-event" class="modal" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-event-title">新增时间节点</h3>
            <button class="modal-close" data-close="modal-event">&times;</button>
        </div>
        <form id="form-event" class="modal-body">
            <input type="hidden" id="event-id">
            <div class="form-row">
                <div class="form-group">
                    <label>月份 <span class="required">*</span></label>
                    <input type="month" id="event-month" required>
                </div>
                <div class="form-group">
                    <label>具体日期（可选）</label>
                    <input type="date" id="event-date">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>日期精度</label>
                    <select id="event-date-precision">
                        <option value="month">仅月份</option>
                        <option value="day">精确到日</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>结束日期（可选）</label>
                    <input type="date" id="event-end-date">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>节点标题 <span class="required">*</span></label>
                    <input type="text" id="event-title" required placeholder="如：国考公告预计发布">
                </div>
                <div class="form-group">
                    <label>节点类型</label>
                    <select id="event-type">
                        <option value="其他">其他</option>
                        <option value="公告">公告</option>
                        <option value="报名/投递">报名/投递</option>
                        <option value="笔试/测评">笔试/测评</option>
                        <option value="面试">面试</option>
                        <option value="录用/体检">录用/体检</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>所属类别</label>
                    <select id="event-category">
                        <option value="">请先选择机会大类</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>机会大类</label>
                    <select id="event-track">
                        <option value="">加载分类中...</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>状态</label>
                    <select id="event-status">
                        <option value="参考往年">参考往年</option>
                        <option value="官方已确定">官方已确定</option>
                        <option value="待更新">待更新</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>当前动作</label>
                    <select id="event-current-action">
                        <option value="">请选择</option>
                        <option value="等公告">等公告</option>
                        <option value="等报名">等报名</option>
                        <option value="待投递">待投递</option>
                        <option value="已投递">已投递</option>
                        <option value="待笔试">待笔试</option>
                        <option value="待面试">待面试</option>
                        <option value="已结束">已结束</option>
                        <option value="已放弃">已放弃</option>
                        <option value="持续关注">持续关注</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>关联机会（可选）</label>
                <select id="event-opportunity-id"><option value="">不关联</option></select>
            </div>
            <div class="form-group">
                <label>相关链接</label>
                <input type="url" id="event-link" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="event-note" rows="3"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">保存</button>
                <button type="button" class="btn btn-secondary" data-close="modal-event">取消</button>
            </div>
        </form>
    </div>
</div>

<div id="modal-fav" class="modal" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-fav-title">编辑岗位收藏</h3>
            <button class="modal-close" data-close="modal-fav">&times;</button>
        </div>
        <form id="form-fav" class="modal-body">
            <input type="hidden" id="fav-id">
            <div class="form-row">
                <div class="form-group">
                    <label>岗位名称 <span class="required">*</span></label>
                    <input type="text" id="fav-job-name" required>
                </div>
                <div class="form-group">
                    <label>所属机会</label>
                    <input type="text" id="fav-opp-name" readonly>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>机会大类</label>
                    <select id="fav-track">
                        <option value="体制/准体制">体制 / 准体制</option>
                        <option value="互联网/市场化">互联网 / 市场化</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>单位名称</label>
                    <input type="text" id="fav-organization">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>地区</label>
                    <select id="fav-region">
                        <option value="衡阳">衡阳</option>
                        <option value="湖南">湖南</option>
                        <option value="全国">全国</option>
                        <option value="远程">远程</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>专业要求</label>
                    <input type="text" id="fav-major">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>学历要求</label>
                    <input type="text" id="fav-education">
                </div>
                <div class="form-group">
                    <label>报名/投递时间</label>
                    <input type="hidden" id="fav-apply-time">
                    <div class="jr-time-picker" data-time-picker="fav-apply-time"></div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>笔试/测评时间</label>
                    <input type="hidden" id="fav-exam-time">
                    <div class="jr-time-picker" data-time-picker="fav-exam-time"></div>
                </div>
                <div class="form-group">
                    <label>面试时间</label>
                    <input type="hidden" id="fav-interview-time">
                    <div class="jr-time-picker" data-time-picker="fav-interview-time"></div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>岗位链接</label>
                    <input type="url" id="fav-job-url" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>公告/官网链接</label>
                    <input type="url" id="fav-source-url" placeholder="https://...">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>匹配状态</label>
                    <select id="fav-match-status">
                        <option value="未判断">未判断</option>
                        <option value="可能可报">可能可报</option>
                        <option value="需要确认">需要确认</option>
                        <option value="明显不符">明显不符</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>关注优先级</label>
                    <select id="fav-priority">
                        <option value="重点关注">重点关注</option>
                        <option value="可以关注">可以关注</option>
                        <option value="低频关注">低频关注</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>当前动作</label>
                <select id="fav-action">
                    <option value="待确认">待确认</option>
                    <option value="待报名">待报名</option>
                    <option value="待投递">待投递</option>
                    <option value="待笔试">待笔试</option>
                    <option value="待面试">待面试</option>
                    <option value="已放弃">已放弃</option>
                    <option value="已结束">已结束</option>
                </select>
            </div>
            <div class="form-group">
                <label>关联机会</label>
                <select id="fav-opportunity-id" disabled><option value="">不关联</option></select>
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="fav-note" rows="3"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">保存</button>
                <button type="button" class="btn btn-secondary" data-close="modal-fav">取消</button>
            </div>
        </form>
    </div>
</div>

<div id="tl-detail-modal" class="modal" style="display:none;">
    <div class="modal-content modal-small">
        <div class="modal-header">
            <h3 id="tl-detail-title">节点详情</h3>
            <button class="modal-close" data-close="tl-detail-modal">&times;</button>
        </div>
        <div id="tl-detail-body" class="detail-modal-body"></div>
    </div>
</div>

<div id="tl-tooltip" class="tl-tooltip"></div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

<script>
(function () {
    const TIME_RE_MONTH = /^\d{4}-\d{2}$/;
    const TIME_RE_DAY = /^\d{4}-\d{2}-\d{2}$/;

    function byId(id) { return document.getElementById(id); }

    function isStandardTimeValue(value) {
        if (!value) return true;
        const parts = String(value).split('~');
        if (parts.length > 2) return false;
        return parts.every(p => TIME_RE_MONTH.test(p) || TIME_RE_DAY.test(p));
    }

    window.parseTimeValue = function parseTimeValue(value) {
        value = (value || '').trim();
        const result = { mode: 'point', precision: 'month', start: '', end: '', legacy: '' };
        if (!value) return result;
        if (!isStandardTimeValue(value)) {
            result.legacy = value;
            return result;
        }
        const parts = value.split('~');
        result.mode = parts.length === 2 ? 'range' : 'point';
        result.start = parts[0] || '';
        result.end = parts[1] || '';
        result.precision = (result.start.length === 10 || result.end.length === 10) ? 'day' : 'month';
        return result;
    };

    window.buildTimeValue = function buildTimeValue(mode, precision, start, end) {
        start = (start || '').trim();
        end = (end || '').trim();
        if (!start) return '';
        if (mode === 'range') {
            if (!end) return start;
            if (end < start) throw new Error('结束时间不能早于开始时间');
            return `${start}~${end}`;
        }
        return start;
    };

    function renderPickerShell(prefix) {
        const container = document.querySelector(`[data-time-picker="${prefix}"]`);
        if (!container || container.dataset.ready === '1') return container;
        container.dataset.ready = '1';
        container.innerHTML = `
            <div class="jr-time-picker-row">
                <select id="${prefix}-mode" aria-label="时间类型">
                    <option value="point">时间点</option>
                    <option value="range">时间段</option>
                </select>
                <select id="${prefix}-precision" aria-label="时间精度">
                    <option value="month">月份</option>
                    <option value="day">日期</option>
                </select>
            </div>
            <div class="jr-time-picker-row">
                <input id="${prefix}-start" type="month" aria-label="开始时间">
                <span id="${prefix}-end-wrap" class="jr-end-wrap is-hidden">
                    <input id="${prefix}-end" type="month" aria-label="结束时间">
                </span>
            </div>
            <div id="${prefix}-legacy" class="jr-time-legacy"></div>
        `;
        const modeEl = byId(`${prefix}-mode`);
        const precisionEl = byId(`${prefix}-precision`);
        const syncType = () => {
            const type = precisionEl.value === 'day' ? 'date' : 'month';
            byId(`${prefix}-start`).type = type;
            byId(`${prefix}-end`).type = type;
            byId(`${prefix}-end-wrap`).classList.toggle('is-hidden', modeEl.value !== 'range');
        };
        modeEl.addEventListener('change', syncType);
        precisionEl.addEventListener('change', () => {
            const start = byId(`${prefix}-start`);
            const end = byId(`${prefix}-end`);
            start.value = '';
            end.value = '';
            syncType();
        });
        syncType();
        return container;
    }

    window.setupTimePicker = function setupTimePicker(prefix, initialValue) {
        const container = renderPickerShell(prefix);
        if (!container) return;
        const parsed = window.parseTimeValue(initialValue || '');
        const hidden = byId(prefix);
        const modeEl = byId(`${prefix}-mode`);
        const precisionEl = byId(`${prefix}-precision`);
        const startEl = byId(`${prefix}-start`);
        const endEl = byId(`${prefix}-end`);
        const legacyEl = byId(`${prefix}-legacy`);
        if (hidden) hidden.value = initialValue || '';
        modeEl.value = parsed.mode;
        precisionEl.value = parsed.precision;
        precisionEl.dispatchEvent(new Event('change'));
        modeEl.value = parsed.mode;
        modeEl.dispatchEvent(new Event('change'));
        startEl.value = parsed.legacy ? '' : parsed.start;
        endEl.value = parsed.legacy ? '' : parsed.end;
        if (parsed.legacy) {
            legacyEl.textContent = `旧格式：${parsed.legacy}。保存前请重新选择标准时间。`;
            legacyEl.classList.add('show');
        } else {
            legacyEl.textContent = '';
            legacyEl.classList.remove('show');
        }
    };

    window.readTimePicker = function readTimePicker(prefix) {
        const container = document.querySelector(`[data-time-picker="${prefix}"]`);
        const hidden = byId(prefix);
        if (!container) return hidden ? hidden.value.trim() : '';
        const value = window.buildTimeValue(
            byId(`${prefix}-mode`).value,
            byId(`${prefix}-precision`).value,
            byId(`${prefix}-start`).value,
            byId(`${prefix}-end`).value
        );
        if (hidden) hidden.value = value;
        return value;
    };

    window.formatTimeValue = function formatTimeValue(value) {
        value = (value || '').trim();
        if (!value) return '';
        const fmt = (v) => {
            if (TIME_RE_DAY.test(v)) {
                const [y, m, d] = v.split('-');
                return `${y}年${Number(m)}月${Number(d)}日`;
            }
            if (TIME_RE_MONTH.test(v)) {
                const [y, m] = v.split('-');
                return `${y}年${Number(m)}月`;
            }
            return v;
        };
        if (value.includes('~')) {
            const [a, b] = value.split('~');
            return `${fmt(a)} 至 ${fmt(b)}`;
        }
        return fmt(value);
    };
})();
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
